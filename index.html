<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSEA Smart Analyser v2.1</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--border:#334155;--text:#f1f5f9;--sub:#94a3b8;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--gold:#f59e0b;--cyan:#06b6d4;--purple:#a855f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo{font-size:15px;font-weight:800;color:#fff;letter-spacing:1px}
.logo span{color:var(--blue)}
.badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.smart-badge{background:linear-gradient(90deg,#0ea5e9,#6366f1);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;outline:none}
button{padding:7px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-smart{background:linear-gradient(90deg,#0ea5e9,#6366f1);color:#fff}.btn-smart:hover{opacity:.9}
.btn-sm{background:var(--bg3);color:var(--sub);border:1px solid var(--border);padding:5px 12px;font-size:11px}.btn-sm:hover{color:#fff;border-color:var(--blue)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#64748b;display:inline-block}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:10px 15px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.main{padding:20px;max-width:1400px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.kpi-val{font-size:22px;font-weight:800;color:#fff;margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--sub)}
.green{color:var(--green)} .red{color:var(--red)} .gold{color:var(--gold)} .cyan{color:var(--cyan)} .blue{color:var(--blue)}
.analysis-panel{background:linear-gradient(135deg,rgba(14,165,233,.08),rgba(99,102,241,.08));border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:20px;margin-bottom:16px}
.analysis-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.analysis-icon{width:34px;height:34px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.analysis-title{font-size:14px;font-weight:700;color:#fff}
.analysis-subtitle{font-size:11px;color:var(--sub)}
.insight-block{background:rgba(0,0,0,.25);border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid var(--blue)}
.insight-block.warn{border-left-color:var(--gold)}
.insight-block.good{border-left-color:var(--green)}
.insight-block.bad{border-left-color:var(--red)}
.insight-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;color:var(--sub)}
.insight-block.warn .insight-label{color:var(--gold)}
.insight-block.good .insight-label{color:var(--green)}
.insight-block.bad .insight-label{color:var(--red)}
.insight-text{font-size:13px;color:#e2e8f0;line-height:1.7}
.insight-text strong{color:#fff}
.rec-list{list-style:none;margin-top:8px}
.rec-list li{padding:5px 0;font-size:12px;color:#cbd5e1;display:flex;gap:8px;line-height:1.5}
.rec-list li::before{content:'→';color:var(--blue);flex-shrink:0;font-weight:700}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.check-row:last-child{border-bottom:none}
.check-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ok{background:rgba(34,197,94,.15);color:var(--green)}
.warn{background:rgba(245,158,11,.15);color:var(--gold)}
.fail{background:rgba(239,68,68,.15);color:var(--red)}
.check-label{font-size:12px;font-weight:600;color:#fff;flex:1}
.check-detail{font-size:11px;color:var(--sub)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--sub);font-size:11px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge-buy{background:rgba(34,197,94,.15);color:var(--green);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:rgba(239,68,68,.15);color:var(--red);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:rgba(245,158,11,.15);color:var(--gold);padding:2px 7px;border-radius:4px;font-size:10px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.pill-g{background:rgba(34,197,94,.15);color:var(--green)}
.pill-r{background:rgba(239,68,68,.15);color:var(--red)}
.tbl-wrap{overflow-x:auto;max-height:340px;overflow-y:auto}
.snap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.snap-item{background:var(--bg3);border-radius:8px;padding:10px;text-align:center}
.snap-cur{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px}
.snap-val{font-size:16px;font-weight:800}
.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.progress{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:3px;transition:width .5s}
.anomaly-item{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px;margin-bottom:8px}
.anomaly-item.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}
.anomaly-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
.anomaly-item.warn .anomaly-title{color:var(--gold)}
.anomaly-desc{font-size:11px;color:var(--sub);line-height:1.6}
#loadStatus{font-size:11px;color:var(--sub)}
.score-ring{display:flex;align-items:center;gap:16px}
.score-circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;border:3px solid}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CSEA <span>Smart</span> Analyser</div>
  <div class="badge">v2.1</div>
  <div class="smart-badge">⚡ Smart Analysis</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusTxt" style="font-size:11px;color:var(--sub)">Idle</span>
  </div>
</div>

<div class="toolbar">
  <label style="font-size:11px;color:var(--sub)">Account:</label>
  <select id="acctSelect" onchange="acctId=this.value"></select>
  <button class="btn-primary" onclick="loadData()">🔄 Load & Analyse</button>
  <button class="btn-smart" onclick="setTab('analysis',null);render()">🧠 Smart Analysis</button>
  <span id="loadStatus"></span>
</div>

<div class="tabs" id="tabBar">
  <button class="tab active" onclick="setTab('overview',this)">Overview</button>
  <button class="tab" onclick="setTab('analysis',this)">🧠 Analysis</button>
  <button class="tab" onclick="setTab('signals',this)">Signals</button>
  <button class="tab" onclick="setTab('trades',this)">Trades</button>
  <button class="tab" onclick="setTab('compound',this)">Compound</button>
  <button class="tab" onclick="setTab('snapshot',this)">Currency Snapshot</button>
  <button class="tab" onclick="setTab('anomalies',this)">Anomalies</button>
</div>

<div class="main" id="mainContent">
  <div class="empty">
    <div style="font-size:36px;margin-bottom:10px">🧠</div>
    <p style="color:#fff;font-size:15px;font-weight:700;margin-bottom:6px">CSEA Smart Analyser</p>
    <p>Select an account and click Load & Analyse</p>
  </div>
</div>

<script>
const SB_URL='https://nmyveijljquxvhjelqbc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
let db={trades:[],signals:[],daily:[],positions:[]};
let acctId='',activeTab='overview',checks=[],anomalies=[],insights=[];

async function sb(table,params=''){
  const PAGE=1000;let all=[],from=0;
  while(true){
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${from}`,{headers:{...HDR,'Range-Unit':'items',Range:`${from}-${from+PAGE-1}`}});
    if(!r.ok) break;
    const pg=await r.json(); all=all.concat(pg);
    if(pg.length<PAGE) break; from+=PAGE;
  }
  return all;
}

async function loadData(){
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusTxt');
  dot.className='status-dot'; txt.textContent='Loading…';
  document.getElementById('loadStatus').textContent='Fetching…';
  try{
    const accts=await sb('accounts','select=*&order=created_at');
    const sel=document.getElementById('acctSelect');
    sel.innerHTML='<option value="">All Accounts</option>';
    accts.forEach(a=>{const o=document.createElement('option');o.value=a.id;o.textContent=a.name||a.account_number;sel.appendChild(o);});
    if(!acctId&&accts.length){sel.value=accts[0].id;acctId=accts[0].id;}
    const f=acctId?`account_id=eq.${acctId}`:'select=*';
    const [trades,signals,daily]=await Promise.all([
      sb('trades',`select=*&order=ts${acctId?'&'+f:''}`),
      sb('signals',`select=*&order=ts${acctId?'&'+f:''}`),
      sb('daily',`select=*&order=date${acctId?'&'+f:''}`)
    ]);
    db.trades=trades; db.signals=signals; db.daily=daily;
    const closeTickets=new Set(trades.filter(t=>t.event==='CLOSE'||t.event==='COMPOUND_CLOSE').map(t=>t.ticket));
    db.positions=trades.filter(t=>t.event==='OPEN'&&!closeTickets.has(t.ticket));
    dot.className='status-dot live'; txt.textContent='Live';
    document.getElementById('loadStatus').textContent=`${trades.length} trades · ${signals.length} signals · ${daily.length} days`;
    runAnalysis();
    render();
  }catch(e){dot.className='status-dot';txt.textContent='Error';document.getElementById('loadStatus').textContent='Error: '+e.message;}
}

function fmtPnl(v){const n=parseFloat(v||0);return(n>=0?'+':'')+n.toFixed(2);}
function statusIcon(s){return s==='ok'?'✓':s==='warn'?'⚠':'✗';}

function getStats(){
  const closed=db.trades.filter(t=>t.event==='CLOSE');
  const wins=closed.filter(t=>parseFloat(t.pnl||0)>0);
  const losses=closed.filter(t=>parseFloat(t.pnl||0)<=0);
  const totalPnl=closed.reduce((a,t)=>a+parseFloat(t.pnl||0),0);
  const avgWin=wins.length?wins.reduce((a,t)=>a+parseFloat(t.pnl||0),0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,t)=>a+parseFloat(t.pnl||0),0)/losses.length:0;
  const rr=avgLoss?Math.abs(avgWin/avgLoss):0;
  const opened=db.signals.filter(s=>s.result==='OPENED').length;
  const lastDaily=db.daily.length?db.daily[db.daily.length-1]:null;
  return{closed:closed.length,wins:wins.length,losses:losses.length,wr:closed.length?wins.length/closed.length*100:0,totalPnl,avgWin,avgLoss,rr,opened,blocked:db.signals.length-opened,positions:db.positions.length,lastDaily};
}

function getPairStats(){
  const closed=db.trades.filter(t=>t.event==='CLOSE');
  const map={};
  closed.forEach(t=>{
    const s=t.symbol||'?';
    if(!map[s]) map[s]={sym:s,trades:0,wins:0,pnl:0,pnls:[]};
    map[s].trades++; const p=parseFloat(t.pnl||0);
    map[s].pnl+=p; map[s].pnls.push(p);
    if(p>0) map[s].wins++;
  });
  return Object.values(map).sort((a,b)=>b.pnl-a.pnl);
}

// ── Smart Rule-Based Analysis Engine ─────────────────────────────
function runAnalysis(){
  checks=[]; anomalies=[]; insights=[];
  const s=getStats();
  const pairs=getPairStats();
  const closed=db.trades.filter(t=>t.event==='CLOSE');
  const sigs=db.signals;
  const opens=db.trades.filter(t=>t.event==='OPEN');
  const lastDaily=db.daily.length?db.daily[db.daily.length-1]:null;
  const targetHitDays=db.daily.filter(d=>d.target_hit).length;
  const blockReasons={};
  sigs.filter(s=>s.result==='BLOCKED').forEach(s=>{const r=s.block_reason||'Unknown';blockReasons[r]=(blockReasons[r]||0)+1;});

  // ── Health Checks ──
  const lastSig=sigs.length?sigs[sigs.length-1]:null;
  const minsAgo=lastSig?Math.round((Date.now()-new Date(lastSig.ts))/60000):9999;
  checks.push({label:'Push Connectivity',detail:lastSig?`Last signal ${minsAgo<60?minsAgo+'m':Math.round(minsAgo/60)+'h'} ago`:'No signals',status:minsAgo<180?'ok':minsAgo<600?'warn':'fail'});

  const openRate=sigs.length?Math.round(s.opened/sigs.length*100):0;
  checks.push({label:'Signal Open Rate',detail:`${s.opened}/${sigs.length} opened (${openRate}%)`,status:openRate>3&&openRate<70?'ok':openRate===0?'fail':'warn'});

  const stale=db.positions.filter(p=>(Date.now()-new Date(p.ts))/86400000>2);
  checks.push({label:'Stale OPEN Records',detail:stale.length?`${stale.length} open >2 days`:'None',status:stale.length===0?'ok':stale.length<5?'warn':'fail'});

  const tradeDates=[...new Set(opens.map(t=>(t.ts||'').slice(0,10)))].filter(Boolean);
  const dailyDates=new Set(db.daily.map(d=>d.date));
  const missingDays=tradeDates.filter(d=>!dailyDates.has(d));
  checks.push({label:'Daily Record Coverage',detail:missingDays.length?`Missing: ${missingDays.slice(0,2).join(', ')}`:'Complete',status:missingDays.length===0?'ok':missingDays.length<3?'warn':'fail'});

  checks.push({label:'Win Rate',detail:`${s.wins}W/${s.losses}L = ${s.wr.toFixed(1)}%`,status:s.wr>=55?'ok':s.wr>=40?'warn':'fail'});
  checks.push({label:'Risk:Reward',detail:`Avg R:R = ${s.rr.toFixed(2)}`,status:s.rr>=1.5?'ok':s.rr>=1?'warn':'fail'});

  const gaps=sigs.filter(s=>s.result==='OPENED').map(s=>parseFloat(s.gap||0));
  const avgGap=gaps.length?gaps.reduce((a,b)=>a+b,0)/gaps.length:0;
  checks.push({label:'Signal Gap Quality',detail:`Avg gap: ${avgGap.toFixed(3)}`,status:avgGap>=0.4?'ok':avgGap>=0.25?'warn':'fail'});

  const compRate=db.daily.length?Math.round(targetHitDays/db.daily.length*100):0;
  checks.push({label:'Compound Target Rate',detail:`${targetHitDays}/${db.daily.length} days hit (${compRate}%)`,status:compRate>=60?'ok':compRate>=40?'warn':'fail'});

  // ── Anomalies ──
  if(stale.length) anomalies.push({type:'warn',title:`${stale.length} Stale OPEN Records`,desc:`Positions open >2 days — likely missed compound close pushes. Symbols: ${[...new Set(stale.map(p=>p.symbol))].join(', ')}`});
  if(missingDays.length) anomalies.push({type:'warn',title:'Missing Daily Records',desc:`${missingDays.length} trading day(s) missing daily row: ${missingDays.join(', ')}`});
  const bigLoss=closed.filter(t=>parseFloat(t.pnl||0)<-50);
  if(bigLoss.length) anomalies.push({type:'error',title:`${bigLoss.length} Large Loss(es) >$50`,desc:bigLoss.map(t=>`${t.symbol} ${fmtPnl(t.pnl)}`).join(', ')});
  const worstPair=pairs.find(p=>p.pnl<-20);
  if(worstPair) anomalies.push({type:'warn',title:`${worstPair.sym} Dragging Performance`,desc:`${worstPair.trades} trades, ${Math.round(worstPair.wins/worstPair.trades*100)}% WR, total P&L ${fmtPnl(worstPair.pnl)}`});

  // ── Smart Insights ──
  // Performance insight
  if(s.closed>0){
    const perfTone=s.totalPnl>0&&s.wr>=55?'good':s.totalPnl<0||s.wr<40?'bad':'warn';
    insights.push({type:perfTone,label:'Performance Summary',text:
      `Account has <strong>${s.closed} closed trades</strong> with a <strong>${s.wr.toFixed(1)}% win rate</strong> and <strong>${fmtPnl(s.totalPnl)} total P&L</strong>. `+
      (s.rr>=2?`Excellent R:R of ${s.rr.toFixed(2)} — your winners are significantly larger than your losers.`:
       s.rr>=1?`Healthy R:R of ${s.rr.toFixed(2)} — winners outpace losers.`:
       `R:R of ${s.rr.toFixed(2)} is below 1:1 — you need a high win rate to stay profitable. Average win is ${fmtPnl(s.avgWin)}, average loss is ${fmtPnl(s.avgLoss)}.`)
    });
  }

  // Signal quality insight
  if(sigs.length>0){
    const topBlockReason=Object.entries(blockReasons).sort((a,b)=>b[1]-a[1])[0];
    const concBlocks=blockReasons['Max concurrent']||blockReasons['Corr: '+(topBlockReason?.[0]||'')]||0;
    insights.push({type:openRate<10?'warn':'ok' ,label:'Signal Quality',text:
      `<strong>${sigs.length} signals</strong> generated — ${openRate}% opened, ${100-openRate}% blocked. `+
      (topBlockReason?`Most common block reason: <strong>${topBlockReason[0]}</strong> (${topBlockReason[1]} times). `:'') +
      (openRate<5?`Very low open rate suggests market conditions are not strongly trending or gap threshold is high.`:
       openRate>50?`High open rate — the EA is trading frequently. Monitor drawdown carefully.`:
       `Open rate is healthy — the EA is selective without being too restrictive.`)
    });
  }

  // Best/worst pair insight
  if(pairs.length>0){
    const best=pairs[0], worst=pairs[pairs.length-1];
    insights.push({type:'ok',label:'Pair Performance',text:
      `Best performing pair: <strong>${best.sym}</strong> (${best.trades} trades, ${Math.round(best.wins/best.trades*100)}% WR, ${fmtPnl(best.pnl)}). `+
      (pairs.length>1?`Weakest: <strong>${worst.sym}</strong> (${worst.trades} trades, ${Math.round(worst.wins/worst.trades*100)}% WR, ${fmtPnl(worst.pnl)}). `:'') +
      (worst.pnl<-20?`Consider whether ${worst.sym} is worth continuing to trade — it's dragging overall performance.`:`All pairs are contributing positively or within acceptable range.`)
    });
  }

  // Compound insight
  if(db.daily.length>0){
    const bal=lastDaily?parseFloat(lastDaily.end_balance||0):0;
    const startBal=db.daily[0]?parseFloat(db.daily[0].start_balance||0):0;
    const growth=startBal?((bal-startBal)/startBal*100):0;
    const compTone=compRate>=60?'good':compRate>=40?'warn':'bad';
    insights.push({type:compTone,label:'Compound Progress',text:
      `On <strong>Day ${lastDaily?.compound_day||'?'}</strong> with balance <strong>$${bal.toFixed(2)}</strong>. `+
      `Target hit on <strong>${targetHitDays}/${db.daily.length} days (${compRate}%)</strong>. `+
      (startBal?`Account has grown <strong>${growth>=0?'+':''}${growth.toFixed(1)}%</strong> since Day 1. `:'') +
      (compRate>=60?`Compound is performing well — stay disciplined and let it run.`:
       compRate>=40?`Compound hit rate is moderate. Review losing days for patterns — news events, time of day, or specific pairs.`:
       `Compound target is being missed more than hit. Check lot sizing and whether the daily target is realistic for current market conditions.`)
    });
  }

  // Recommendations
  const recs=[];
  if(s.wr<50) recs.push(`Win rate is below 50% — review signal gap threshold (InpMinStrengthGap). A higher threshold filters weaker signals.`);
  if(s.rr<1) recs.push(`R:R below 1:1 — consider tightening SL or widening TP. Review the ADR-based SL/TP settings.`);
  if(openRate>50) recs.push(`Signal open rate is high (${openRate}%) — the EA may be overtrading. Consider raising InpMinStrengthGap.`);
  if(compRate<50&&db.daily.length>=5) recs.push(`Compound target hit rate is below 50%. Check if InpCompoundTarget is calibrated correctly for your broker's spreads.`);
  if(stale.length>0) recs.push(`${stale.length} stale OPEN records detected — run the Supabase cleanup query to keep the dashboard accurate.`);
  const worstPairRec=pairs.find(p=>p.trades>=3&&p.pnl<-10);
  if(worstPairRec) recs.push(`${worstPairRec.sym} has ${worstPairRec.trades} trades at ${Math.round(worstPairRec.wins/worstPairRec.trades*100)}% WR — consider disabling this currency pair temporarily.`);
  if(recs.length===0) recs.push(`System looks healthy across all key metrics — maintain current settings and let the compound run.`);

  insights.push({type:'blue',label:'Recommendations',recs});
}

function setTab(id,btn){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else{
    const tabs=document.querySelectorAll('.tab');
    const map=['overview','analysis','signals','trades','compound','snapshot','anomalies'];
    const idx=map.indexOf(id);
    if(idx>=0) tabs[idx].classList.add('active');
  }
  render();
}

function render(){
  if(!db.trades.length&&!db.signals.length) return;
  const c=document.getElementById('mainContent');
  if(activeTab==='overview') c.innerHTML=renderOverview();
  else if(activeTab==='analysis') c.innerHTML=renderAnalysis();
  else if(activeTab==='signals') c.innerHTML=renderSignals();
  else if(activeTab==='trades') c.innerHTML=renderTrades();
  else if(activeTab==='compound') c.innerHTML=renderCompound();
  else if(activeTab==='snapshot') c.innerHTML=renderSnapshot();
  else if(activeTab==='anomalies') c.innerHTML=renderAnomalies();
}

function renderOverview(){
  const s=getStats();
  const passChecks=checks.filter(c=>c.status==='ok').length;
  const healthPct=checks.length?Math.round(passChecks/checks.length*100):0;
  const healthCol=healthPct>=80?'var(--green)':healthPct>=50?'var(--gold)':'var(--red)';
  return`
  <div class="grid4">
    <div class="card"><div class="card-title">Total P&L</div><div class="kpi-val ${s.totalPnl>=0?'green':'red'}">${fmtPnl(s.totalPnl)}</div><div class="kpi-sub">${s.closed} closed trades</div></div>
    <div class="card"><div class="card-title">Win Rate</div><div class="kpi-val ${s.wr>=50?'green':'red'}">${s.wr.toFixed(1)}%</div><div class="kpi-sub">${s.wins}W / ${s.losses}L</div></div>
    <div class="card"><div class="card-title">Risk:Reward</div><div class="kpi-val ${s.rr>=1?'green':'red'}">${s.rr.toFixed(2)}</div><div class="kpi-sub">Avg win ${fmtPnl(s.avgWin)}</div></div>
    <div class="card"><div class="card-title">System Health</div><div class="kpi-val" style="color:${healthCol}">${healthPct}%</div><div class="kpi-sub">${passChecks}/${checks.length} checks pass</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Health Checks</div>
      ${checks.map(c=>`<div class="check-row"><div class="check-icon ${c.status}">${statusIcon(c.status)}</div><div class="check-label">${c.label}</div><div class="check-detail">${c.detail}</div></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">Quick Stats</div>
      <div class="grid2" style="gap:10px;margin-bottom:12px">
        <div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--blue)">${db.signals.length}</div><div style="font-size:11px;color:var(--sub)">Total Signals</div></div>
        <div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--green)">${s.opened}</div><div style="font-size:11px;color:var(--sub)">Opened</div></div>
        <div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--gold)">${s.blocked}</div><div style="font-size:11px;color:var(--sub)">Blocked</div></div>
        <div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--cyan)">${s.positions}</div><div style="font-size:11px;color:var(--sub)">Open Now</div></div>
      </div>
      ${s.lastDaily?`<div style="background:var(--bg3);border-radius:8px;padding:12px">
        <div style="font-size:11px;color:var(--sub);margin-bottom:8px">LAST DAILY — ${s.lastDaily.date}</div>
        <div style="display:flex;gap:16px">
          <div><div style="font-size:11px;color:var(--sub)">Day</div><div style="font-weight:700;color:var(--cyan)">${s.lastDaily.compound_day}</div></div>
          <div><div style="font-size:11px;color:var(--sub)">P&L</div><div style="font-weight:700;color:${parseFloat(s.lastDaily.daily_pnl||0)>=0?'var(--green)':'var(--red)'}">${fmtPnl(s.lastDaily.daily_pnl)}</div></div>
          <div><div style="font-size:11px;color:var(--sub)">Balance</div><div style="font-weight:700;color:#fff">$${parseFloat(s.lastDaily.end_balance||0).toFixed(2)}</div></div>
          <div><div style="font-size:11px;color:var(--sub)">Target</div><div style="font-weight:700;color:${s.lastDaily.target_hit?'var(--green)':'var(--sub)'}">${s.lastDaily.target_hit?'✓ HIT':'MISS'}</div></div>
        </div>
      </div>`:''}
      <div style="margin-top:12px;text-align:center">
        <button class="btn-smart" style="width:100%" onclick="setTab('analysis',null);render()">🧠 View Full Analysis</button>
      </div>
    </div>
  </div>`;
}

function renderAnalysis(){
  const s=getStats();
  const passChecks=checks.filter(c=>c.status==='ok').length;
  const healthPct=checks.length?Math.round(passChecks/checks.length*100):0;
  const healthCol=healthPct>=80?'var(--green)':healthPct>=50?'var(--gold)':'var(--red)';
  const recInsight=insights.find(i=>i.recs);
  const mainInsights=insights.filter(i=>!i.recs);

  return`
  <div class="analysis-panel">
    <div class="analysis-header">
      <div class="analysis-icon">🧠</div>
      <div>
        <div class="analysis-title">Smart Analysis Report</div>
        <div class="analysis-subtitle">Rule-based analysis across performance, signals, compound & anomalies</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <div class="score-ring">
          <div class="score-circle" style="color:${healthCol};border-color:${healthCol}">${healthPct}%</div>
          <div><div style="font-size:12px;font-weight:700;color:#fff">System Health</div><div style="font-size:11px;color:var(--sub)">${passChecks}/${checks.length} checks passing</div></div>
        </div>
      </div>
    </div>
    ${mainInsights.map(i=>`
      <div class="insight-block ${i.type==='good'?'good':i.type==='bad'?'bad':i.type==='warn'?'warn':''}">
        <div class="insight-label">${i.label}</div>
        <div class="insight-text">${i.text}</div>
      </div>`).join('')}
    ${recInsight?`<div class="insight-block" style="border-left-color:var(--cyan)">
      <div class="insight-label" style="color:var(--cyan)">Actionable Recommendations</div>
      <ul class="rec-list">${recInsight.recs.map(r=>`<li>${r}</li>`).join('')}</ul>
    </div>`:''}
  </div>
  ${anomalies.length?`<div class="card"><div class="card-title">⚠ Active Anomalies (${anomalies.length})</div>
    ${anomalies.map(a=>`<div class="anomaly-item ${a.type==='warn'?'warn':''}">
      <div class="anomaly-title">${a.type==='warn'?'⚠ ':'🚨 '}${a.title}</div>
      <div class="anomaly-desc">${a.desc}</div>
    </div>`).join('')}
  </div>`:'<div class="card" style="text-align:center;padding:20px"><span style="color:var(--green);font-size:13px;font-weight:700">✓ No anomalies detected</span></div>'}`;
}

function renderSignals(){
  const sigs=[...db.signals].reverse().slice(0,200);
  const blockReasons={};
  db.signals.filter(s=>s.result==='BLOCKED').forEach(s=>{const r=s.block_reason||'Unknown';blockReasons[r]=(blockReasons[r]||0)+1;});
  const sortedReasons=Object.entries(blockReasons).sort((a,b)=>b[1]-a[1]);
  const totalBlocked=db.signals.filter(s=>s.result==='BLOCKED').length;
  return`<div class="grid2" style="margin-bottom:16px">
    <div class="card"><div class="card-title">Block Reason Breakdown</div>
      ${sortedReasons.slice(0,8).map(([r,n])=>{const pct=totalBlocked?Math.round(n/totalBlocked*100):0;return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:#e2e8f0">${r}</span><span style="color:var(--gold)">${n} (${pct}%)</span></div><div class="progress"><div class="progress-bar" style="width:${pct}%;background:var(--gold)"></div></div></div>`;}).join('')}
    </div>
    <div class="card"><div class="card-title">Gap Distribution (Opened)</div>
      ${(()=>{const gmap={};db.signals.filter(s=>s.result==='OPENED').forEach(s=>{const g=(Math.floor(parseFloat(s.gap||0)*5)/5).toFixed(1);if(!gmap[g])gmap[g]=0;gmap[g]++;});const entries=Object.entries(gmap).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0]));const mx=Math.max(...entries.map(e=>e[1]),1);return entries.map(([g,n])=>`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--sub)">≥${g}</span><span style="color:var(--green)">${n}</span></div><div class="progress"><div class="progress-bar" style="width:${Math.round(n/mx*100)}%;background:var(--green)"></div></div></div>`).join('');})()}
    </div>
  </div>
  <div class="card"><div class="card-title">Recent Signals</div>
  <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Result</th><th>Block Reason</th></tr></thead><tbody>
  ${sigs.map(s=>`<tr><td style="color:var(--sub)">${(s.ts||'').slice(0,16)}</td><td style="color:var(--blue);font-weight:700">${s.symbol||'—'}</td><td><span class="badge-${(s.direction||'').toLowerCase()}">${s.direction||'—'}</span></td><td style="color:var(--green)">${s.strong_cur||'—'}</td><td style="color:var(--red)">${s.weak_cur||'—'}</td><td>${parseFloat(s.gap||0).toFixed(4)}</td><td><span class="${s.result==='OPENED'?'badge-buy':'badge-blocked'}">${s.result||'—'}</span></td><td style="color:var(--sub);font-size:11px">${s.block_reason||'—'}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function renderTrades(){
  const pairs=getPairStats();
  const closed=db.trades.filter(t=>t.event==='CLOSE');
  return`<div class="grid2" style="margin-bottom:16px">
    <div class="card"><div class="card-title">P&L by Pair</div>
      ${pairs.slice(0,10).map(p=>{const wr=Math.round(p.wins/p.trades*100);const maxPnl=Math.max(...pairs.map(x=>Math.abs(x.pnl)),1);return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:12px;font-weight:700;color:#fff">${p.sym}</span><div style="display:flex;gap:8px"><span style="font-size:11px;color:var(--sub)">${wr}% WR</span><span style="font-size:12px;font-weight:700;color:${p.pnl>=0?'var(--green)':'var(--red)'}">${fmtPnl(p.pnl)}</span></div></div><div class="progress"><div class="progress-bar" style="width:${Math.min(100,Math.abs(p.pnl)/maxPnl*100)}%;background:${p.pnl>=0?'var(--green)':'var(--red)'}"></div></div></div>`;}).join('')}
    </div>
    <div class="card"><div class="card-title">Open Positions (${db.positions.length})</div>
      <div class="tbl-wrap" style="max-height:280px"><table><thead><tr><th>Symbol</th><th>Dir</th><th>Lot</th><th>Entry</th><th>Opened</th></tr></thead><tbody>
        ${db.positions.map(p=>`<tr><td style="color:var(--blue);font-weight:700">${p.symbol||'—'}</td><td><span class="badge-${(p.direction||'').toLowerCase()}">${p.direction||'—'}</span></td><td>${p.lot||'—'}</td><td>${parseFloat(p.entry||0).toFixed(5)}</td><td style="color:var(--sub);font-size:11px">${(p.ts||'').slice(0,16)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>
  <div class="card"><div class="card-title">Recent Closed Trades</div>
  <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Lot</th><th>Entry</th><th>P&L</th><th>Day</th></tr></thead><tbody>
  ${[...closed].reverse().slice(0,50).map(t=>`<tr><td style="color:var(--sub)">${(t.ts||'').slice(0,16)}</td><td style="color:var(--blue);font-weight:700">${t.symbol||'—'}</td><td><span class="badge-${(t.direction||'').toLowerCase()}">${t.direction||'—'}</span></td><td>${t.lot||'—'}</td><td>${parseFloat(t.entry||0).toFixed(5)}</td><td style="color:${parseFloat(t.pnl||0)>=0?'var(--green)':'var(--red)'};font-weight:700">${fmtPnl(t.pnl)}</td><td style="color:var(--cyan)">${t.compound_day||'—'}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function renderCompound(){
  const days=[...db.daily].sort((a,b)=>a.date>b.date?1:-1);
  const lastDay=days.length?days[days.length-1]:null;
  const targetHitDays=days.filter(d=>d.target_hit).length;
  const totalPnl=days.reduce((a,d)=>a+parseFloat(d.daily_pnl||0),0);
  return`<div class="grid4" style="margin-bottom:16px">
    <div class="card"><div class="card-title">Current Day</div><div class="kpi-val cyan">${lastDay?lastDay.compound_day:'—'}</div><div class="kpi-sub">${lastDay?lastDay.date:''}</div></div>
    <div class="card"><div class="card-title">Balance</div><div class="kpi-val green">$${lastDay?parseFloat(lastDay.end_balance||0).toFixed(2):'—'}</div><div class="kpi-sub">End of last day</div></div>
    <div class="card"><div class="card-title">Target Hit Days</div><div class="kpi-val gold">${targetHitDays}/${days.length}</div><div class="kpi-sub">${days.length?Math.round(targetHitDays/days.length*100):0}% rate</div></div>
    <div class="card"><div class="card-title">Total P&L</div><div class="kpi-val ${totalPnl>=0?'green':'red'}">${fmtPnl(totalPnl)}</div><div class="kpi-sub">Across ${days.length} days</div></div>
  </div>
  <div class="card"><div class="card-title">Daily Log</div>
  <div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Day</th><th>Start</th><th>End</th><th>P&L</th><th>Target</th><th>Lot</th><th>Hit</th></tr></thead><tbody>
  ${[...days].reverse().map(d=>{const pnl=parseFloat(d.daily_pnl||0);return`<tr><td style="color:var(--sub)">${d.date}</td><td style="color:var(--cyan);font-weight:700">${d.compound_day}</td><td>$${parseFloat(d.start_balance||0).toFixed(2)}</td><td>$${parseFloat(d.end_balance||0).toFixed(2)}</td><td style="color:${pnl>=0?'var(--green)':'var(--red)'};font-weight:700">${fmtPnl(pnl)}</td><td style="color:var(--gold)">$${parseFloat(d.compound_target||0).toFixed(2)}</td><td>${d.compound_lot||'—'}</td><td><span class="pill ${d.target_hit?'pill-g':'pill-r'}">${d.target_hit?'✓ HIT':'MISS'}</span></td></tr>`;}).join('')}
  </tbody></table></div></div>`;
}

function renderSnapshot(){
  const sigs=db.signals.filter(s=>s.currency_snapshot).slice(-50).reverse();
  if(!sigs.length) return`<div class="empty"><div style="font-size:36px;margin-bottom:10px">📊</div><p>No snapshot data — requires EA v3.55+</p></div>`;
  const latest=sigs[0].currency_snapshot;
  const snap=typeof latest==='string'?JSON.parse(latest):latest;
  const currencies=Object.entries(snap).sort((a,b)=>a[1]-b[1]);
  return`<div class="card" style="margin-bottom:16px"><div class="card-title">Latest Snapshot — ${(sigs[0].ts||'').slice(0,16)}</div>
    <div class="snap-grid">${currencies.map(([cur,val])=>{const v=parseFloat(val);const col=v<-0.3?'var(--green)':v>0.3?'var(--red)':'var(--sub)';return`<div class="snap-item"><div class="snap-cur">${cur}</div><div class="snap-val" style="color:${col}">${v>0?'+':''}${v.toFixed(4)}</div><div style="font-size:10px;color:${col};margin-top:2px">${v<-0.3?'GREEN':v>0.3?'RED':'NEUTRAL'}</div></div>`;}).join('')}
    </div>
  </div>
  <div class="card"><div class="card-title">Signal Snapshot History</div>
  <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Result</th><th>EUR</th><th>GBP</th><th>AUD</th><th>NZD</th><th>USD</th><th>CAD</th><th>CHF</th><th>JPY</th></tr></thead><tbody>
  ${sigs.map(s=>{const sk=s.currency_snapshot?typeof s.currency_snapshot==='string'?JSON.parse(s.currency_snapshot):s.currency_snapshot:{};const fv=v=>v!==undefined?`<span style="color:${parseFloat(v)<-0.3?'var(--green)':parseFloat(v)>0.3?'var(--red)':'var(--sub)'}">${parseFloat(v)>0?'+':''}${parseFloat(v).toFixed(3)}</span>`:'—';return`<tr><td style="color:var(--sub);font-size:11px">${(s.ts||'').slice(0,16)}</td><td style="color:var(--blue);font-weight:700">${s.symbol||'—'}</td><td><span class="badge-${(s.direction||'').toLowerCase()}">${s.direction||'—'}</span></td><td><span class="${s.result==='OPENED'?'badge-buy':'badge-blocked'}">${s.result||'—'}</span></td><td>${fv(sk.EUR)}</td><td>${fv(sk.GBP)}</td><td>${fv(sk.AUD)}</td><td>${fv(sk.NZD)}</td><td>${fv(sk.USD)}</td><td>${fv(sk.CAD)}</td><td>${fv(sk.CHF)}</td><td>${fv(sk.JPY)}</td></tr>`;}).join('')}
  </tbody></table></div></div>`;
}

function renderAnomalies(){
  return`<div style="margin-bottom:16px">
    ${anomalies.length===0?`<div class="empty"><div style="font-size:36px;margin-bottom:10px">✅</div><p style="color:var(--green);font-weight:700">No anomalies detected</p></div>`:
    anomalies.map(a=>`<div class="anomaly-item ${a.type==='warn'?'warn':''}"><div class="anomaly-title">${a.type==='warn'?'⚠ ':'🚨 '}${a.title}</div><div class="anomaly-desc">${a.desc}</div></div>`).join('')}
  </div>
  <div class="card"><div class="card-title">All Health Checks</div>
    ${checks.map(c=>`<div class="check-row"><div class="check-icon ${c.status}">${statusIcon(c.status)}</div><div class="check-label">${c.label}</div><div class="check-detail">${c.detail}</div></div>`).join('')}
  </div>`;
}

// Init
(async()=>{
  const accts=await sb('accounts','select=*&order=created_at').catch(()=>[]);
  const sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>';
  accts.forEach(a=>{const o=document.createElement('option');o.value=a.id;o.textContent=a.name||a.account_number;sel.appendChild(o);});
  if(accts.length){sel.value=accts[0].id;acctId=accts[0].id;}
})();
</script>
