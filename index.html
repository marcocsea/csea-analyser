<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSEA EA Health Analyser v1.1</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--green:#16a34a;--red:#dc2626;--gold:#d97706;--cyan:#0891b2;--blue:#3b82f6}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
  header{background:#1e40af;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:700;color:#fff}
  header span{font-size:11px;color:#bfdbfe;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:4px}
  #loadBar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
  select,button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;outline:none}
  button{background:#1e40af;border-color:#1e40af;color:#fff;font-weight:600}
  button:hover{background:#1d39a0}
  button:disabled{opacity:.4;cursor:not-allowed}
  #status{font-size:11px;color:var(--sub);margin-left:auto}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  main{padding:20px;display:grid;gap:20px}
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px}
  .tab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
  .tab.active{color:#1e40af;border-bottom-color:#3b82f6}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card-title .badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
  .ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.fail{background:#fee2e2;color:#991b1b}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:4px}
  .kpi-value{font-size:20px;font-weight:700}
  .kpi-sub{font-size:10px;color:var(--sub);margin-top:2px}
  .green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}.cyan{color:var(--cyan)}.blue{color:var(--blue)}
  .check-grid{display:grid;gap:8px}
  .check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
  .check-icon{font-size:16px;flex-shrink:0;margin-top:1px}
  .check-label{font-weight:600;font-size:12px;color:var(--text)}
  .check-detail{font-size:11px;color:var(--sub);margin-top:2px}
  .tbl-wrap{overflow-x:auto;max-height:380px;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;position:sticky;top:0;border-bottom:1px solid var(--border)}
  td{padding:8px 10px;border-bottom:1px solid var(--border);color:#334155}
  tr:hover td{background:var(--bg3)}
  .badge-buy{background:#dcfce7;color:#166534;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
  .badge-sell{background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
  .badge-ok{background:#dcfce7;color:#166534;padding:1px 6px;border-radius:3px;font-size:10px}
  .badge-warn{background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:3px;font-size:10px}
  .badge-fail{background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:3px;font-size:10px}
  .compound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .day-card{background:var(--bg3);border-radius:8px;padding:10px;border:1px solid var(--border)}
  .day-card.win{border-color:#16a34a;background:#f0fdf4}.day-card.loss{border-color:#dc2626;background:#fef2f2}.day-card.partial{border-color:#d97706;background:#fffbeb}.day-card.open{border-color:#0891b2;background:#f0f9ff}
  .day-num{font-size:10px;color:var(--sub);margin-bottom:4px}
  .day-pnl{font-size:15px;font-weight:700}
  .day-meta{font-size:10px;color:var(--sub);margin-top:2px}
  .clean-start-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;display:flex;align-items:center;gap:8px;color:#1e40af}
  .hidden{display:none}
  #tabs-panel .tab-content{display:none}
  #tabs-panel .tab-content.active{display:block}
</style>
</head>
<body>

<header>
  <div style="font-size:18px">&#9889;</div>
  <h1>CSEA EA Health Analyser</h1>
  <span>v1.1 &mdash; Live Supabase</span>
</header>

<div id="loadBar">
  <select id="acctSel"><option value="">Loading accounts...</option></select>
  <select id="cleanStartFilter">
    <option value="">All data</option>
    <option value="2026-03-23" selected>Clean start: 23 Mar 2026+</option>
  </select>
  <button id="loadBtn" onclick="loadAll()" disabled>Load &amp; Analyse</button>
  <div id="status">Not loaded</div>
</div>

<main>
  <div id="results" class="hidden">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview',this)">Overview</div>
      <div class="tab" onclick="switchTab('signals',this)">Signal Integrity</div>
      <div class="tab" onclick="switchTab('execution',this)">Trade Execution</div>
      <div class="tab" onclick="switchTab('management',this)">Trade Management</div>
      <div class="tab" onclick="switchTab('compound',this)">Compound Progress</div>
      <div class="tab" onclick="switchTab('anomalies',this)">Anomalies</div>
    </div>
    <div id="tabs-panel">
      <div class="tab-content active" id="tab-overview"></div>
      <div class="tab-content" id="tab-signals"></div>
      <div class="tab-content" id="tab-execution"></div>
      <div class="tab-content" id="tab-management"></div>
      <div class="tab-content" id="tab-compound"></div>
      <div class="tab-content" id="tab-anomalies"></div>
    </div>
  </div>
</main>

<script>
var SB_URL = 'https://nmyveijljquxvhjelqbc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';

var db = {trades:[],signals:[],daily:[]};
var accounts = [];

async function sb(table, query) {
  query = query || '';
  var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+query+'&limit=5000', {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error(r.status+' '+await r.text());
  return r.json();
}

async function init() {
  setStatus('<span class="spinner"></span>Loading accounts...');
  try {
    var all = await sb('accounts','select=id,label,account_type,strategy,account_number,broker&strategy=eq.CSEA');
    accounts = all;
    var sel = document.getElementById('acctSel');
    sel.innerHTML = '<option value="ALL">All CSEA Accounts</option>' +
      accounts.map(function(a) {
        return '<option value="'+a.id+'">'+a.label+' (#'+a.account_number+')</option>';
      }).join('');
    document.getElementById('loadBtn').disabled = false;
    setStatus('Ready &mdash; select account and load');
  } catch(e) {
    setStatus('&#9888; Could not connect to Supabase: '+e.message);
  }
}

async function loadAll() {
  var acctId = document.getElementById('acctSel').value;
  var cleanStart = document.getElementById('cleanStartFilter').value;
  document.getElementById('loadBtn').disabled = true;
  setStatus('<span class="spinner"></span>Fetching data...');
  try {
    var acctFilter = acctId === 'ALL' ? '' : 'account_id=eq.'+acctId+'&';
    var dateFilter = cleanStart ? 'ts=gte.'+cleanStart+'T00:00:00&' : '';
    var dailyDateFilter = cleanStart ? 'date=gte.'+cleanStart+'&' : '';
    var results = await Promise.all([
      sb('trades', acctFilter+dateFilter+'select=*&order=ts'),
      sb('signals', acctFilter+dateFilter+'select=*&order=ts'),
      sb('daily', acctFilter+dailyDateFilter+'select=*&order=date')
    ]);
    db.trades = results[0] || [];
    db.signals = results[1] || [];
    db.daily = results[2] || [];
    var cleanNote = cleanStart ? ' (from '+cleanStart+')' : '';
    setStatus('&#10003; Loaded &mdash; '+db.trades.length+' trades, '+db.signals.length+' signals, '+db.daily.length+' daily rows'+cleanNote);
    runAnalysis();
  } catch(e) {
    setStatus('&#10007; Error: '+e.message);
  }
  document.getElementById('loadBtn').disabled = false;
}

function setStatus(html) { document.getElementById('status').innerHTML = html; }
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}
function runAnalysis() {
  document.getElementById('results').classList.remove('hidden');
  renderOverview(); renderSignalIntegrity(); renderExecution();
  renderManagement(); renderCompound(); renderAnomalies();
}
function closed() {
  return db.trades.filter(function(t){
    return (t.event==='CLOSE'||t.event==='COMPOUND_CLOSE') && parseFloat(t.pnl||0) !== 0;
  });
}
function opened() { return db.trades.filter(function(t){return t.event==='OPEN';}); }
function pnl(t) { return parseFloat(t.pnl||0); }
function fmtPnl(v) { return (v>=0?'+':'')+v.toFixed(2); }

function renderOverview() {
  var cl = closed();
  var wins = cl.filter(function(t){return pnl(t)>0;});
  var losses = cl.filter(function(t){return pnl(t)<0;});
  var totalPnl = cl.reduce(function(s,t){return s+pnl(t);},0);
  var wr = cl.length ? (wins.length/cl.length*100) : 0;
  var grossW = wins.reduce(function(s,t){return s+pnl(t);},0);
  var grossL = Math.abs(losses.reduce(function(s,t){return s+pnl(t);},0));
  var pf = grossL>0 ? grossW/grossL : 999;
  var checks = getHealthChecks();
  var passCount = checks.filter(function(c){return c.status==='ok';}).length;
  var warnCount = checks.filter(function(c){return c.status==='warn';}).length;
  var failCount = checks.filter(function(c){return c.status==='fail';}).length;
  var overallStatus = failCount>0?'ISSUES FOUND':warnCount>0?'WARNINGS':'ALL CLEAR';
  var overallClass = failCount>0?'fail':warnCount>0?'warn':'ok';
  var cleanStart = document.getElementById('cleanStartFilter').value;
  document.getElementById('tab-overview').innerHTML =
  '<div class="clean-start-banner">&#128197; <strong>Period:</strong> '+(cleanStart?'From '+cleanStart+' (clean start)':'All data')+' &nbsp;&middot;&nbsp; <strong>EA v3.67</strong> &nbsp;&middot;&nbsp; Compound Table &nbsp;&middot;&nbsp; GlobalPrime Demo #107499</div>'+
  '<div class="kpi-grid">'+
    '<div class="kpi"><div class="kpi-label">System Health</div><div class="kpi-value '+(overallClass==='ok'?'green':overallClass==='warn'?'gold':'red')+'">'+overallStatus+'</div><div class="kpi-sub">'+passCount+' pass &middot; '+warnCount+' warn &middot; '+failCount+' fail</div></div>'+
    '<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-value '+(totalPnl>=0?'green':'red')+'">'+fmtPnl(totalPnl)+'</div><div class="kpi-sub">'+cl.length+' closed</div></div>'+
    '<div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-value '+(wr>=50?'green':'red')+'">'+wr.toFixed(1)+'%</div><div class="kpi-sub">'+wins.length+'W / '+losses.length+'L</div></div>'+
    '<div class="kpi"><div class="kpi-label">Profit Factor</div><div class="kpi-value '+(pf>=1.2?'green':pf>=1?'gold':'red')+'">'+(pf===999?'&infin;':pf.toFixed(2))+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Signals</div><div class="kpi-value cyan">'+db.signals.length+'</div><div class="kpi-sub">'+db.signals.filter(function(s){return s.result==='OPENED';}).length+' opened</div></div>'+
    '<div class="kpi"><div class="kpi-label">Daily Rows</div><div class="kpi-value blue">'+db.daily.length+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Health Checks <span class="badge '+overallClass+'">'+passCount+'/'+checks.length+' PASS</span></div>'+
  '<div class="check-grid">'+checks.map(function(c){
    return '<div class="check-row"><div class="check-icon">'+(c.status==='ok'?'&#10003;':c.status==='warn'?'&#9888;':'&#10007;')+'</div>'+
      '<div><div class="check-label">'+c.label+'</div><div class="check-detail">'+c.detail+'</div></div></div>';
  }).join('')+'</div></div>';
}

function getHealthChecks() {
  var cl = closed(); var checks = [];
  checks.push({label:'Supabase Connectivity',status:db.trades.length>0?'ok':'fail',
    detail:db.trades.length>0?db.trades.length+' trades, '+db.signals.length+' signals, '+db.daily.length+' daily rows':'No data &mdash; check InpUserID and InpPlatformAPIKey in EA'});
  var openedSigs=db.signals.filter(function(s){return s.result==='OPENED'&&s.gap!=null;});
  var lowGap=openedSigs.filter(function(s){return parseFloat(s.gap)<0.5;});
  checks.push({label:'Gap Threshold (&ge;0.5)',status:lowGap.length===0?'ok':lowGap.length<3?'warn':'fail',
    detail:lowGap.length===0?'All '+openedSigs.length+' signals meet threshold':lowGap.length+' signals below 0.5 gap: '+lowGap.map(function(s){return s.symbol+' '+parseFloat(s.gap).toFixed(3);}).join(', ')});
  var orphaned=db.trades.filter(function(t){
    if(t.event!=='OPEN')return false;
    return !db.trades.some(function(c){return c.ticket===t.ticket&&(c.event==='CLOSE'||c.event==='COMPOUND_CLOSE');});
  }).length;
  checks.push({label:'Orphaned OPEN Records',status:orphaned===0?'ok':orphaned<3?'warn':'fail',
    detail:orphaned===0?'All opens have matching closes':orphaned+' OPENs with no matching CLOSE (may be current positions)'});
  var cmpd=cl.filter(function(t){return t.compound_day&&parseInt(t.compound_day)>0;});
  checks.push({label:'Compound Mode Data',status:cmpd.length>0?'ok':'warn',
    detail:cmpd.length>0?cmpd.length+'/'+cl.length+' trades have compound_day set':'No compound_day on closed trades'});
  var lastD=db.daily.slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');})[0];
  checks.push({label:'Daily Table',status:lastD?'ok':'warn',
    detail:lastD?'Latest: '+lastD.date+' | Day '+lastD.compound_day+' | Lot '+parseFloat(lastD.compound_lot||0).toFixed(2)+' | Target $'+parseFloat(lastD.compound_target||0).toFixed(2):'No daily rows'});
  return checks;
}

function renderSignalIntegrity() {
  var sigs=db.signals;
  if(!sigs.length){document.getElementById('tab-signals').innerHTML='<div class="card"><p style="color:var(--sub)">No signal data.</p></div>';return;}
  var opened_s=sigs.filter(function(s){return s.result==='OPENED';});
  var blocked=sigs.filter(function(s){return s.result==='BLOCKED';});
  var reasons={};blocked.forEach(function(s){var r=s.block_reason||'Unknown';reasons[r]=(reasons[r]||0)+1;});
  var gaps=opened_s.map(function(s){return parseFloat(s.gap||0);}).filter(function(v){return !isNaN(v);});
  var avgGap=gaps.length?gaps.reduce(function(a,b){return a+b;},0)/gaps.length:0;
  var symCount={};opened_s.forEach(function(s){symCount[s.symbol||'?']=(symCount[s.symbol||'?']||0)+1;});
  var topSyms=Object.entries(symCount).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  document.getElementById('tab-signals').innerHTML=
  '<div class="kpi-grid">'+
    '<div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value blue">'+sigs.length+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Opened</div><div class="kpi-value green">'+opened_s.length+'</div><div class="kpi-sub">'+(sigs.length?(opened_s.length/sigs.length*100).toFixed(1):0)+'%</div></div>'+
    '<div class="kpi"><div class="kpi-label">Blocked</div><div class="kpi-value red">'+blocked.length+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Avg Gap</div><div class="kpi-value gold">'+avgGap.toFixed(3)+'</div></div>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">'+
    '<div class="card"><div class="card-title">Block Reasons</div>'+Object.entries(reasons).sort(function(a,b){return b[1]-a[1];}).map(function(r){
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--sub)">'+r[0]+'</span><span style="font-weight:700;color:var(--gold)">'+r[1]+'</span></div>';
    }).join('')+'</div>'+
    '<div class="card"><div class="card-title">Top Symbols</div>'+topSyms.map(function(s){
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:#1e40af;font-weight:600">'+s[0]+'</span><span style="font-weight:700">'+s[1]+'</span></div>';
    }).join('')+'</div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Recent Signals (last 50)</div><div class="tbl-wrap"><table>'+
    '<thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Result</th><th>Reason</th></tr></thead>'+
    '<tbody>'+sigs.slice(-50).reverse().map(function(s){
      return '<tr><td style="color:var(--sub)">'+(s.ts||'').slice(0,16)+'</td><td style="color:#1e40af;font-weight:600">'+(s.symbol||'')+'</td>'+
        '<td><span class="badge-'+((s.direction||'').toLowerCase())+'">'+(s.direction||'')+'</span></td>'+
        '<td style="color:var(--green)">'+(s.strong_cur||'')+'</td><td style="color:var(--red)">'+(s.weak_cur||'')+'</td>'+
        '<td>'+parseFloat(s.gap||0).toFixed(3)+'</td><td><span class="'+(s.result==='OPENED'?'badge-ok':'badge-fail')+'">'+(s.result||'')+'</span></td>'+
        '<td style="color:var(--sub);font-size:10px">'+(s.block_reason||'')+'</td></tr>';
    }).join('')+'</tbody></table></div></div>';
}

function renderExecution() {
  var cl=closed();
  var openedSigs=db.signals.filter(function(s){return s.result==='OPENED';});
  var unmatched=openedSigs.filter(function(s){
    return !db.trades.some(function(t){return t.symbol===s.symbol&&(t.direction||'').toUpperCase()===(s.direction||'').toUpperCase()&&(t.ts||'').slice(0,13)===(s.ts||'').slice(0,13);});
  });
  document.getElementById('tab-execution').innerHTML=
  '<div class="kpi-grid">'+
    '<div class="kpi"><div class="kpi-label">Signals Opened</div><div class="kpi-value green">'+openedSigs.length+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Trades in DB</div><div class="kpi-value blue">'+db.trades.length+'</div><div class="kpi-sub">'+cl.length+' closed &middot; '+opened().length+' open</div></div>'+
    '<div class="kpi"><div class="kpi-label">Unmatched</div><div class="kpi-value '+(unmatched.length===0?'green':'red')+'">'+unmatched.length+'</div></div>'+
  '</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-title">Execution '+(unmatched.length===0?'<span class="badge ok">ALL MATCHED</span>':'<span class="badge warn">'+unmatched.length+' UNMATCHED</span>')+'</div>'+
    (unmatched.length===0?'<p style="color:var(--green)">&#10003; Every opened signal has a matching trade.</p>':
      '<p style="color:var(--gold);margin-bottom:8px">'+unmatched.length+' signals unmatched within same hour.</p>')+
  '</div>'+
  '<div class="card"><div class="card-title">Recent Closed Trades</div><div class="tbl-wrap"><table>'+
    '<thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Lot</th><th>Entry</th><th>P&L</th><th>Day</th></tr></thead>'+
    '<tbody>'+cl.slice(-40).reverse().map(function(t){
      return '<tr><td style="color:var(--sub)">'+(t.ts||'').slice(0,16)+'</td>'+
        '<td style="color:#1e40af;font-weight:600">'+(t.symbol||'')+'</td>'+
        '<td><span class="badge-'+((t.direction||'').toLowerCase())+'">'+(t.direction||'')+'</span></td>'+
        '<td style="color:var(--green)">'+(t.strong_cur||'&mdash;')+'</td><td style="color:var(--red)">'+(t.weak_cur||'&mdash;')+'</td>'+
        '<td>'+(t.gap?parseFloat(t.gap).toFixed(3):'&mdash;')+'</td>'+
        '<td>'+parseFloat(t.lot||0).toFixed(2)+'</td><td>'+parseFloat(t.entry||0).toFixed(5)+'</td>'+
        '<td style="color:'+(pnl(t)>=0?'var(--green)':'var(--red)')+';font-weight:700">'+fmtPnl(pnl(t))+'</td>'+
        '<td style="color:var(--sub)">'+(t.compound_day||'&mdash;')+'</td></tr>';
    }).join('')+'</tbody></table></div></div>';
}

function renderManagement() {
  var cl=closed();
  var wins=cl.filter(function(t){return pnl(t)>0;});
  var losses=cl.filter(function(t){return pnl(t)<0;});
  var avgW=wins.length?wins.reduce(function(s,t){return s+pnl(t);},0)/wins.length:0;
  var avgL=losses.length?Math.abs(losses.reduce(function(s,t){return s+pnl(t);},0)/losses.length):0;
  var rrRatio=avgL>0?avgW/avgL:0;
  var ticketMap={};
  db.trades.forEach(function(t){if(!t.ticket)return;ticketMap[t.ticket]=ticketMap[t.ticket]||[];ticketMap[t.ticket].push(t);});
  var partials=Object.entries(ticketMap).filter(function(e){return e[1].length>2;});
  var targetHits=db.daily.filter(function(d){return d.target_hit===true;});
  document.getElementById('tab-management').innerHTML=
  '<div class="kpi-grid">'+
    '<div class="kpi"><div class="kpi-label">Avg Win</div><div class="kpi-value green">+'+avgW.toFixed(2)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Avg Loss</div><div class="kpi-value red">-'+avgL.toFixed(2)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">W/L Ratio</div><div class="kpi-value '+(rrRatio>=1?'green':'gold')+'">'+rrRatio.toFixed(2)+'x</div></div>'+
    '<div class="kpi"><div class="kpi-label">Partial Closes</div><div class="kpi-value blue">'+partials.length+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Target Hit Days</div><div class="kpi-value gold">'+targetHits.length+'</div></div>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div class="card"><div class="card-title">Target Hit Days</div>'+
      (targetHits.length===0?'<p style="color:var(--sub)">No target hit days yet.</p>':
        targetHits.map(function(d){
          return '<div style="padding:8px 0;border-bottom:1px solid var(--border)">'+
            '<div style="display:flex;justify-content:space-between"><span style="color:#1e40af">'+d.date+'</span>'+
            '<span style="color:var(--green);font-weight:700">+$'+parseFloat(d.daily_pnl||0).toFixed(2)+'</span></div>'+
            '<div style="font-size:10px;color:var(--sub)">Day '+d.compound_day+' &middot; Target $'+parseFloat(d.compound_target||0).toFixed(2)+' &middot; Lot '+parseFloat(d.compound_lot||0).toFixed(2)+'</div></div>';
        }).join(''))+
    '</div>'+
    '<div class="card"><div class="card-title">Multi-Row Tickets (Partial TP)</div>'+
      (partials.length===0?'<p style="color:var(--sub)">No partial close sequences yet.</p>':
        partials.slice(0,10).map(function(e){
          return '<div style="padding:8px 0;border-bottom:1px solid var(--border)">'+
            '<div style="color:#1e40af;font-weight:600">#'+e[0]+' &mdash; '+(e[1][0]&&e[1][0].symbol||'?')+'</div>'+
            '<div style="font-size:10px;color:var(--sub)">'+e[1].length+' rows: '+e[1].map(function(r){return r.event;}).join(', ')+'</div></div>';
        }).join(''))+
    '</div>'+
  '</div>';
}

function renderCompound() {
  var daily=db.daily.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
  if(!daily.length){document.getElementById('tab-compound').innerHTML='<div class="card"><p style="color:var(--sub)">No daily data.</p></div>';return;}
  var days=daily.map(function(d){
    var dpnl=parseFloat(d.daily_pnl||0);
    var target=parseFloat(d.compound_target||0);
    var endBal=parseFloat(d.end_balance||0);
    var status=d.target_hit===true?'win':dpnl<0?'loss':dpnl>0?'partial':'open';
    return {date:d.date,dpnl:dpnl,target:target,endBal:endBal,cday:d.compound_day,status:status,lot:d.compound_lot};
  });
  var winDays=days.filter(function(d){return d.status==='win';}).length;
  var lossDays=days.filter(function(d){return d.status==='loss';}).length;
  var latestDay=days[days.length-1];
  document.getElementById('tab-compound').innerHTML=
  '<div class="kpi-grid">'+
    '<div class="kpi"><div class="kpi-label">Balance (last row)</div><div class="kpi-value green">£'+(latestDay?latestDay.endBal.toFixed(2):'--')+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Compound Day</div><div class="kpi-value blue">'+(latestDay&&latestDay.cday?'Day '+latestDay.cday:'--')+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Current Lot</div><div class="kpi-value gold">'+(latestDay&&latestDay.lot?parseFloat(latestDay.lot).toFixed(2)+'L':'--')+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Target Hit Days</div><div class="kpi-value green">'+winDays+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Loss Days</div><div class="kpi-value red">'+lossDays+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Total Days</div><div class="kpi-value">'+days.length+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Day-by-Day Progress</div><div class="compound-grid">'+
    days.map(function(d){
      return '<div class="day-card '+d.status+'">'+
        '<div class="day-num">Day '+(d.cday||'?')+' &middot; '+d.date+'</div>'+
        '<div class="day-pnl '+(d.dpnl>=0?'green':'red')+'">'+fmtPnl(d.dpnl)+'</div>'+
        '<div class="day-meta">Target: '+(d.target>0?'+$'+d.target.toFixed(2):'&mdash;')+'</div>'+
        '<div class="day-meta">Bal: $'+d.endBal.toFixed(2)+'</div>'+
        (d.lot?'<div class="day-meta">Lot: '+parseFloat(d.lot).toFixed(2)+'</div>':'')+
      '</div>';
    }).join('')+
  '</div></div>';
}

function renderAnomalies() {
  var cl=closed(); var anomalies=[];
  var orphans=db.trades.filter(function(t){
    if(t.event!=='OPEN')return false;
    return !db.trades.some(function(c){return c.ticket===t.ticket&&(c.event==='CLOSE'||c.event==='COMPOUND_CLOSE');});
  });
  if(orphans.length>0) anomalies.push({type:'warn',label:'Orphaned OPEN Records ('+orphans.length+')',
    detail:orphans.map(function(t){return t.symbol+' #'+t.ticket+' '+t.ts.slice(0,10);}).join(', ')+' &mdash; may be current positions or stale records'});
  var closeTickets=cl.map(function(t){return t.ticket;}).filter(Boolean);
  var dups=closeTickets.filter(function(t,i){return closeTickets.indexOf(t)!==i;});
  if(dups.length>0) anomalies.push({type:'warn',label:'Duplicate Close Tickets',
    detail:[...new Set(dups)].slice(0,5).join(', ')});
  var missingCurr=cl.filter(function(t){return !t.strong_cur||!t.weak_cur;});
  if(missingCurr.length>0) anomalies.push({type:'warn',label:'Missing Currency Fields ('+missingCurr.length+')',
    detail:missingCurr.length+'/'+cl.length+' trades missing strong_cur/weak_cur (expected for pre-v3.48 or COMPOUND_CLOSE)'});
  var avgWin=cl.filter(function(t){return pnl(t)>0;}).reduce(function(s,t){return s+pnl(t);},0)/(cl.filter(function(t){return pnl(t)>0;}).length||1);
  var bigWins=cl.filter(function(t){return pnl(t)>avgWin*2.5&&pnl(t)>0;});
  if(bigWins.length>0) anomalies.push({type:'ok',label:'Big Winners ('+bigWins.length+') &mdash; TP2 or Compound Close',
    detail:bigWins.slice(0,4).map(function(t){return t.symbol+' '+fmtPnl(pnl(t));}).join(', ')});
  var lowGap=db.signals.filter(function(s){return s.result==='OPENED'&&parseFloat(s.gap||1)<0.5;});
  if(lowGap.length>0) anomalies.push({type:'fail',label:'Signals Below Gap Threshold (<0.5)',
    detail:lowGap.map(function(s){return s.symbol+' gap='+parseFloat(s.gap).toFixed(3);}).join(', ')});
  if(anomalies.length===0) anomalies.push({type:'ok',label:'No anomalies detected',detail:'All checks passed.'});
  document.getElementById('tab-anomalies').innerHTML=
  '<div class="card"><div class="card-title">Anomaly Report <span class="badge '+(anomalies.some(function(a){return a.type==='fail';})?'fail':anomalies.some(function(a){return a.type==='warn';})?'warn':'ok')+'">'+anomalies.length+' items</span></div>'+
  '<div class="check-grid">'+anomalies.map(function(a){
    return '<div class="check-row"><div class="check-icon">'+(a.type==='ok'?'&#10003;':a.type==='warn'?'&#9888;':'&#10007;')+'</div>'+
      '<div><div class="check-label">'+a.label+'</div><div class="check-detail">'+a.detail+'</div></div></div>';
  }).join('')+'</div></div>';
}

init();
</script>
</body>
</html>
